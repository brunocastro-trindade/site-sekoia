  <!-- Meta Pixel Code -->
  <script>
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () {
        n.callMethod ?
          n.callMethod.apply(n, arguments) : n.queue.push(arguments)
      };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = !0; n.version = '2.0';
      n.queue = []; t = b.createElement(e); t.async = !0;
      t.src = v; s = b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t, s)
    }(window, document, 'script',
      'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1217330763796782');

    // PageView com event_id compartilhado: o mesmo id vai no fbq (navegador) e
    // em /api/meta-capi (servidor) — o Meta desduplica o par por event_id.
    (function () {
      var eid = (self.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : 'pv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
      fbq('track', 'PageView', {}, { eventID: eid });
      var sendCapi = function () {
        // Pequeno atraso para o fbevents.js criar o cookie _fbp, que o servidor
        // lê da request e repassa à CAPI (melhora o casamento de identidade).
        setTimeout(function () {
          try {
            fetch('/api/meta-capi', {
              method: 'POST',
              keepalive: true,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                event_name: 'PageView',
                event_id: eid,
                event_source_url: location.href
              })
            }).catch(function () { });
          } catch (e) { /* tracking nunca quebra a página */ }
        }, 1200);
      };
      if (document.readyState === 'complete') sendCapi();
      else addEventListener('load', sendCapi);
    })();
  </script>
  <!-- End Meta Pixel Code -->
